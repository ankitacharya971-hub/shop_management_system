<!DOCTYPE html>
<html>
<head>
    <title>Low Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f2027;
            color: white;
            margin: 0;
        }

        .header {
            background: #203a43;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #203a43;
            min-width: 600px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #555;
            text-align: center;
        }

        th {
            background: #162a33;
        }

        .low {
            background: #a31515;
            font-weight: bold;
        }

        a {
            color: white;
            text-decoration: none;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin-right: 15px;
        }
    </style>
</head>
<body>

<div class="header">
    ⚠ Low Stock Alert
</div>

<div class="container">
    <div class="table-wrap">
        <table>
            <tr>
                <th>Product</th>
                <th>Stock</th>
                <th>Unit</th>
                <th>Low Stock Limit</th>
            </tr>

            {% for p in products %}
            <tr class="low">
                <td>{{ p[2] }}</td>
                <td>{{ p[6] }}</td>
                <td>{{ p[3] }}</td>
                <td>{{ p[9] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div class="links">
        <a href="/stock">➕ Add Stock</a>
        <a href="/dashboard">⬅ Back</a>
    </div>
</div>

</body>
</html>
